name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/chwippo-back" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ env.SHA_TAG }} \
            -t ${{ env.IMAGE }}:main \
            .

      - name: Push to ghcr.io
        run: |
          docker push ${{ env.IMAGE }}:${{ env.SHA_TAG }}
          docker push ${{ env.IMAGE }}:main

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          PORT=3000
          NODE_ENV=production
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_SSL=${{ secrets.DB_SSL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
          KAKAO_CHANNEL_ID=${{ secrets.KAKAO_CHANNEL_ID }}
          KAKAO_ADMIN_KEY=${{ secrets.KAKAO_ADMIN_KEY }}
          R2_ENDPOINT=${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
          MAX_STORAGE_PER_USER_MB=${{ secrets.MAX_STORAGE_PER_USER_MB }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_KAKAO_ID=${{ secrets.ADMIN_KAKAO_ID }}
          EOF

      - name: Deploy
        run: |
          docker-compose pull
          docker-compose up -d
          docker image prune -f
