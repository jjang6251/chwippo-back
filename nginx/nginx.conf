events {
    worker_connections 1024;
}

http {
    # ── Cloudflare 실제 클라이언트 IP 복원 ─────────────────────────────────────
    # Cloudflare를 통과한 요청의 실제 클라이언트 IP를 복원.
    # 없으면 ThrottlerGuard가 Cloudflare IP 기준으로 rate limit → 전체 사용자가 하나의 버킷 공유.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    upstream backend {
        server backend:3000;
    }

    # ── nginx 수준 rate limit (NestJS ThrottlerGuard 앞단 이중 방어) ─────────────
    # /auth/ 엔드포인트: 1분에 10요청 (brute force 차단)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # 일반 API: 1분에 120요청
    limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;

    # ── HTTP → HTTPS 리다이렉트 (EC2 HTTPS 활성화 후 이 블록만 남기고 아래 임시 블록 삭제) ──
    # server {
    #     listen 80;
    #     server_name api.chwippo.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── HTTPS 서버 (Let's Encrypt 발급 후 주석 해제) ────────────────────────────
    # 발급 명령 (EC2에서 실행):
    #   sudo certbot certonly --standalone -d api.chwippo.com
    #   sudo cp /etc/letsencrypt/live/api.chwippo.com/fullchain.pem nginx/ssl/
    #   sudo cp /etc/letsencrypt/live/api.chwippo.com/privkey.pem nginx/ssl/
    # 이후 nginx ssl 폴더가 docker-compose.yml volumes에 마운트됨
    #
    # server {
    #     listen 443 ssl;
    #     server_name api.chwippo.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     client_max_body_size 10M;
    #
    #     # 보안 헤더
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Content-Type-Options nosniff always;
    #     add_header X-Frame-Options DENY always;
    #     add_header Referrer-Policy strict-origin-when-cross-origin always;
    #
    #     # 인증 엔드포인트 — strict rate limit
    #     location /auth/ {
    #         limit_req zone=auth burst=5 nodelay;
    #         limit_req_status 429;
    #         proxy_pass http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    #
    #     # 일반 API
    #     location / {
    #         limit_req zone=api burst=30 nodelay;
    #         limit_req_status 429;
    #         proxy_pass http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 60s;
    #     }
    # }

    # ── 임시 HTTP 서버 (EC2 초기 셋업 및 HTTPS 발급 전까지만 사용) ──────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 10M;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
